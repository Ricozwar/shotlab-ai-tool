# Shotlab MVP – deploy backendu (np. Hetzner)
# Frontend jest hostowany na Vercel lub Cloudflare Pages.

services:
  backend:
    build:
      context: ./SHOTLAB_AI_TOOL/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      # FRONTEND_URL – adres publiczny frontendu na Vercelu (CORS), np. https://app.shotlab.pl
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "3001:3001"
