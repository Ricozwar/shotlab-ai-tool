services:
  - type: web
    name: shotlab-backend
    env: node
    # Skazujemy Render, gdzie leży backend
    rootDir: SHOTLAB_AI_TOOL/backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      # Poniższe zmienne należy zdefiniować w dashboardzie Render.com
      - key: API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
